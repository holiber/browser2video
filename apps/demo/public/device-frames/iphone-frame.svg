<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 870" fill="none">
  <defs>
    <mask id="screen-cutout">
      <rect width="410" height="870" fill="white"/>
      <rect x="19" y="19" width="372" height="832" rx="42" fill="black"/>
    </mask>
    <linearGradient id="edge-shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="30%" stop-color="#888"/>
      <stop offset="50%" stop-color="#999"/>
      <stop offset="70%" stop-color="#888"/>
      <stop offset="100%" stop-color="#666"/>
    </linearGradient>
    <linearGradient id="bezel-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1e1e20"/>
      <stop offset="100%" stop-color="#141416"/>
    </linearGradient>
  </defs>

  <!-- Device body with screen area cut out -->
  <g mask="url(#screen-cutout)">
    <rect x="5" y="5" width="400" height="860" rx="55" fill="url(#bezel-grad)"/>
    <rect x="5" y="5" width="400" height="860" rx="55" fill="none" stroke="url(#edge-shine)" stroke-width="3"/>
    <rect x="8" y="8" width="394" height="854" rx="52" fill="none" stroke="#0a0a0c" stroke-width="1"/>
  </g>

  <!-- Screen edge -->
  <rect x="18.5" y="18.5" width="373" height="833" rx="42.5" fill="none" stroke="#333" stroke-width="1"/>

  <!-- Dynamic Island -->
  <rect x="161" y="28" width="88" height="25" rx="12.5" fill="#000" stroke="#222" stroke-width="0.5"/>
  <circle cx="230" cy="40.5" r="5" fill="#0c0c14"/>
  <circle cx="230" cy="40.5" r="3" fill="#111128" opacity="0.8"/>

  <!-- Side buttons -->
  <!-- Silent switch -->
  <rect x="1" y="180" width="5" height="28" rx="2" fill="#3a3a3c" stroke="#555" stroke-width="0.5"/>
  <!-- Volume up -->
  <rect x="1" y="235" width="5" height="52" rx="2" fill="#3a3a3c" stroke="#555" stroke-width="0.5"/>
  <!-- Volume down -->
  <rect x="1" y="305" width="5" height="52" rx="2" fill="#3a3a3c" stroke="#555" stroke-width="0.5"/>
  <!-- Power -->
  <rect x="404" y="275" width="5" height="82" rx="2" fill="#3a3a3c" stroke="#555" stroke-width="0.5"/>
</svg>
