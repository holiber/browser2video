<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 410 860" fill="none">
  <defs>
    <mask id="screen-cutout">
      <rect width="410" height="860" fill="white"/>
      <rect x="19" y="19" width="372" height="822" rx="38" fill="black"/>
    </mask>
    <linearGradient id="edge-shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="30%" stop-color="#555"/>
      <stop offset="50%" stop-color="#666"/>
      <stop offset="70%" stop-color="#555"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>
    <linearGradient id="bezel-grad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a1a1c"/>
      <stop offset="100%" stop-color="#121214"/>
    </linearGradient>
  </defs>

  <!-- Device body with screen area cut out -->
  <g mask="url(#screen-cutout)">
    <rect x="5" y="5" width="400" height="850" rx="50" fill="url(#bezel-grad)"/>
    <rect x="5" y="5" width="400" height="850" rx="50" fill="none" stroke="url(#edge-shine)" stroke-width="3"/>
    <rect x="8" y="8" width="394" height="844" rx="47" fill="none" stroke="#0a0a0c" stroke-width="1"/>
  </g>

  <!-- Screen edge -->
  <rect x="18.5" y="18.5" width="373" height="823" rx="38.5" fill="none" stroke="#333" stroke-width="1"/>

  <!-- Punch-hole camera -->
  <circle cx="205" cy="34" r="7" fill="#0a0a0e" stroke="#222" stroke-width="0.5"/>
  <circle cx="205" cy="34" r="4" fill="#111128" opacity="0.7"/>

  <!-- Side buttons (Pixel has both on right side) -->
  <!-- Power -->
  <rect x="404" y="230" width="5" height="50" rx="2" fill="#3a3a3c" stroke="#555" stroke-width="0.5"/>
  <!-- Volume up -->
  <rect x="404" y="310" width="5" height="52" rx="2" fill="#3a3a3c" stroke="#555" stroke-width="0.5"/>
  <!-- Volume down -->
  <rect x="404" y="375" width="5" height="52" rx="2" fill="#3a3a3c" stroke="#555" stroke-width="0.5"/>
</svg>
